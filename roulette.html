<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>🎰 Рулетка</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #f5f5f5);
            color: var(--tg-theme-text-color, #333);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 400px;
            width: 100%;
            background: var(--tg-theme-secondary-bg-color, #fff);
            border-radius: 20px;
            padding: 32px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        h1 {
            font-size: 28px;
            color: var(--tg-theme-text-color, #333);
            margin-bottom: 8px;
            font-weight: 700;
        }

        .sub {
            color: var(--tg-theme-hint-color, #888);
            font-size: 14px;
            margin-bottom: 32px;
        }

        .result-box {
            background: var(--tg-theme-bg-color, #f5f5f5);
            border-radius: 16px;
            padding: 40px 20px;
            margin: 0 auto 32px;
            border: 2px solid var(--tg-theme-button-color, #3390ec);
        }

        .result-number {
            font-size: 80px;
            font-weight: 800;
            color: var(--tg-theme-button-color, #3390ec);
            line-height: 1;
            margin-bottom: 8px;
        }

        .result-label {
            font-size: 16px;
            color: var(--tg-theme-hint-color, #888);
            font-weight: 500;
        }

        .spin-btn {
            width: 100%;
            background: var(--tg-theme-button-color, #3390ec);
            border: none;
            padding: 18px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            color: var(--tg-theme-button-text-color, #fff);
            cursor: pointer;
            margin: 20px 0;
            transition: all 0.2s;
        }

        .spin-btn:hover {
            opacity: 0.9;
        }

        .spin-btn:active {
            transform: scale(0.98);
        }

        .spin-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .history {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--tg-theme-hint-color, #e0e0e0);
        }

        .history-title {
            font-size: 14px;
            color: var(--tg-theme-hint-color, #888);
            margin-bottom: 12px;
            font-weight: 500;
        }

        .history-list {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .history-item {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #fff);
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 600;
            font-size: 14px;
            animation: popIn 0.3s ease;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(90deg); }
            50% { transform: rotate(180deg); }
            75% { transform: rotate(270deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .spinning {
            animation: spin 0.5s ease-in-out;
        }

        .result-pulse {
            animation: pulse 0.3s ease-in-out;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🎰 Рулетка</h1>
    <div class="sub">Число от 1 до 7</div>

    <div class="result-box" id="resultBox">
        <div class="result-number" id="resultNumber">?</div>
        <div class="result-label" id="resultLabel">Нажми кнопку</div>
    </div>

    <button class="spin-btn" id="spinBtn">Крутить</button>

    <div class="history">
        <div class="history-title">Последние выпадения:</div>
        <div class="history-list" id="history"></div>
    </div>
</div>

<script>
    const HISTORY_KEY = "roulette_history";

    function loadHistory() {
        const saved = localStorage.getItem(HISTORY_KEY);
        const historyDiv = document.getElementById('history');
        historyDiv.innerHTML = '';
        
        if (saved) {
            const history = JSON.parse(saved);
            history.forEach(num => {
                const item = document.createElement('div');
                item.className = 'history-item';
                item.textContent = num;
                historyDiv.appendChild(item);
            });
        }
    }

    function saveHistory(num) {
        const saved = localStorage.getItem(HISTORY_KEY);
        let history = saved ? JSON.parse(saved) : [];
        history.unshift(num);
        if (history.length > 7) history = history.slice(0, 7);
        localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
        loadHistory();
    }

    function spin() {
        const btn = document.getElementById("spinBtn");
        btn.disabled = true;
        const resultBox = document.getElementById('resultBox');
        resultBox.classList.add("spinning");

        document.getElementById('resultNumber').innerText = '...';
        document.getElementById('resultLabel').innerText = 'Крутим...';

        setTimeout(() => {
            const number = Math.floor(Math.random() * 7) + 1;
            
            showResult(number, "Выпало", `Число: ${number}`);
            saveHistory(number);
            resultBox.classList.remove("spinning");
            resultBox.classList.add("result-pulse");
            btn.disabled = false;

            setTimeout(() => {
                resultBox.classList.remove("result-pulse");
            }, 300);

            if (navigator.vibrate) navigator.vibrate(50);

            if (window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.sendData(JSON.stringify({
                    number: number
                }));
            }
        }, 500);
    }

    function showResult(number, label, text) {
        document.getElementById("resultNumber").innerHTML = number;
        document.getElementById("resultLabel").innerHTML = label;
    }

    loadHistory();
    document.getElementById("spinBtn").addEventListener("click", spin);

    if (window.Telegram && window.Telegram.WebApp) {
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
    }
</script>
</body>
</html>

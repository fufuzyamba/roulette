<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>🎰 Рулетка</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f4a 50%, #0d122b 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 400px;
            width: 100%;
            background: rgba(20, 25, 60, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 32px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-size: 28px;
            color: #fff;
            margin-bottom: 8px;
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .sub {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            margin-bottom: 32px;
        }

        .result-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            padding: 40px 20px;
            margin: 0 auto 32px;
            border: 2px solid rgba(51, 144, 236, 0.5);
            box-shadow: 0 0 30px rgba(51, 144, 236, 0.2);
        }

        .result-number {
            font-size: 80px;
            font-weight: 800;
            color: #3390ec;
            line-height: 1;
            margin-bottom: 8px;
            text-shadow: 0 0 20px rgba(51, 144, 236, 0.5);
        }

        .result-label {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 500;
        }

        .spin-btn {
            width: 100%;
            background: linear-gradient(135deg, #3390ec, #1e6ab8);
            border: none;
            padding: 18px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            margin: 20px 0;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(51, 144, 236, 0.4);
        }

        .spin-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(51, 144, 236, 0.6);
        }

        .spin-btn:active {
            transform: translateY(0);
            box-shadow: 0 2px 10px rgba(51, 144, 236, 0.3);
        }

        .spin-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .history {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .history-title {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 12px;
            font-weight: 500;
        }

        .history-list {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .history-item {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: linear-gradient(135deg, #3390ec, #1e6ab8);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 600;
            font-size: 14px;
            animation: popIn 0.3s ease;
            box-shadow: 0 2px 8px rgba(51, 144, 236, 0.3);
        }

        @keyframes spin {
            0% { transform: rotate(0deg) scale(1); }
            25% { transform: rotate(90deg) scale(0.9); }
            50% { transform: rotate(180deg) scale(1); }
            75% { transform: rotate(270deg) scale(0.9); }
            100% { transform: rotate(360deg) scale(1); }
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 30px rgba(51, 144, 236, 0.2); }
            50% { box-shadow: 0 0 50px rgba(51, 144, 236, 0.5); }
        }

        @keyframes numberReveal {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.2); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        .spinning {
            animation: spin 0.6s ease-in-out;
        }

        .result-pulse {
            animation: glow 1s ease-in-out infinite;
        }

        .number-reveal {
            animation: numberReveal 0.4s ease-out;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🎰 Рулетка</h1>
    <div class="sub">Число от 1 до 7</div>

    <div class="result-box" id="resultBox">
        <div class="result-number" id="resultNumber">?</div>
        <div class="result-label" id="resultLabel">Нажми кнопку</div>
    </div>

    <button class="spin-btn" id="spinBtn">Крутить</button>

    <div class="history">
        <div class="history-title">Последние выпадения:</div>
        <div class="history-list" id="history"></div>
    </div>
</div>

<script>
    const HISTORY_KEY = "roulette_history";

    function loadHistory() {
        const saved = localStorage.getItem(HISTORY_KEY);
        const historyDiv = document.getElementById('history');
        historyDiv.innerHTML = '';
        
        if (saved) {
            const history = JSON.parse(saved);
            history.forEach(num => {
                const item = document.createElement('div');
                item.className = 'history-item';
                item.textContent = num;
                historyDiv.appendChild(item);
            });
        }
    }

    function saveHistory(num) {
        const saved = localStorage.getItem(HISTORY_KEY);
        let history = saved ? JSON.parse(saved) : [];
        history.unshift(num);
        if (history.length > 7) history = history.slice(0, 7);
        localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
        loadHistory();
    }

    function spin() {
        const btn = document.getElementById("spinBtn");
        btn.disabled = true;
        const resultBox = document.getElementById('resultBox');
        resultBox.classList.add("spinning");

        document.getElementById('resultNumber').innerText = '???';
        document.getElementById('resultLabel').innerText = 'Крутим...';

        const finalNumber = Math.floor(Math.random() * 7) + 1;
        let counter = 0;
        const spins = 20;
        const spinDuration = 60;
        const symbols = ['?', '??', '???', '✨', '⭐', '💫', '🎰'];

        const spinInterval = setInterval(() => {
            counter++;
            const symbol = symbols[Math.floor(Math.random() * symbols.length)];
            document.getElementById('resultNumber').innerText = symbol;
            
            if (counter >= spins) {
                clearInterval(spinInterval);
                showResult(finalNumber, "Выпало", `Число: ${finalNumber}`);
                saveHistory(finalNumber);
                resultBox.classList.remove("spinning");
                resultBox.classList.add("result-pulse");
                document.getElementById('resultNumber').classList.add("number-reveal");
                btn.disabled = false;

                setTimeout(() => {
                    resultBox.classList.remove("result-pulse");
                    document.getElementById('resultNumber').classList.remove("number-reveal");
                }, 1000);

                if (navigator.vibrate) navigator.vibrate([50, 30, 50]);

                if (window.Telegram && window.Telegram.WebApp) {
                    window.Telegram.WebApp.sendData(JSON.stringify({
                        number: finalNumber
                    }));
                }
            }
        }, spinDuration);
    }

    function showResult(number, label, text) {
        document.getElementById("resultNumber").innerHTML = number;
        document.getElementById("resultLabel").innerHTML = label;
    }

    loadHistory();
    document.getElementById("spinBtn").addEventListener("click", spin);

    if (window.Telegram && window.Telegram.WebApp) {
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
    }
</script>
</body>
</html>

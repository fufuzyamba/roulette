<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>🎰 Рулетка</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f4a 50%, #0d122b 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        .rose-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.3;
        }

        .rose-background svg {
            position: absolute;
            bottom: -100px;
            right: -100px;
            width: 500px;
            height: 500px;
        }

        .container {
            max-width: 400px;
            width: 100%;
            background: rgba(20, 25, 60, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 32px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            z-index: 1;
        }

        h1 {
            font-size: 28px;
            color: #fff;
            margin-bottom: 8px;
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .sub {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            margin-bottom: 32px;
        }

        .result-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            padding: 40px 20px;
            margin: 0 auto 32px;
            border: 2px solid rgba(51, 144, 236, 0.5);
            box-shadow: 0 0 30px rgba(51, 144, 236, 0.2);
        }

        .result-number {
            font-size: 80px;
            font-weight: 800;
            color: #3390ec;
            line-height: 1;
            margin-bottom: 8px;
            text-shadow: 0 0 20px rgba(51, 144, 236, 0.5);
        }

        .result-label {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 500;
        }

        .spin-btn {
            width: 100%;
            background: linear-gradient(135deg, #3390ec, #1e6ab8);
            border: none;
            padding: 18px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            margin: 20px 0;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(51, 144, 236, 0.4);
        }

        .spin-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(51, 144, 236, 0.6);
        }

        .spin-btn:active {
            transform: translateY(0);
            box-shadow: 0 2px 10px rgba(51, 144, 236, 0.3);
        }

        .spin-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .history {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .history-title {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 12px;
            font-weight: 500;
        }

        .history-list {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .history-item {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: linear-gradient(135deg, #3390ec, #1e6ab8);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 600;
            font-size: 14px;
            animation: popIn 0.3s ease;
            box-shadow: 0 2px 8px rgba(51, 144, 236, 0.3);
        }

        @keyframes spin {
            0% { transform: rotate(0deg) scale(1); }
            25% { transform: rotate(90deg) scale(0.9); }
            50% { transform: rotate(180deg) scale(1); }
            75% { transform: rotate(270deg) scale(0.9); }
            100% { transform: rotate(360deg) scale(1); }
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 30px rgba(51, 144, 236, 0.2); }
            50% { box-shadow: 0 0 50px rgba(51, 144, 236, 0.5); }
        }

        @keyframes numberReveal {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.2); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        .spinning {
            animation: spin 0.6s ease-in-out;
        }

        .result-pulse {
            animation: glow 1s ease-in-out infinite;
        }

        .number-reveal {
            animation: numberReveal 0.4s ease-out;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎰 Рулетка</h1>
    <div class="sub">Число от 1 до 7</div>

    <div class="result-box" id="resultBox">
        <div class="result-number" id="resultNumber">?</div>
        <div class="result-label" id="resultLabel">Нажми кнопку</div>
    </div>

    <button class="spin-btn" id="spinBtn">Крутить</button>

    <div class="rose-container">
      <svg id="roseGarden" viewBox="0 0 700 500" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="petalGrad" cx="50%" cy="70%" r="60%">
        <stop offset="0%" stop-color="#ff85a1"/>
        <stop offset="60%" stop-color="#e8385a"/>
        <stop offset="100%" stop-color="#c02050"/>
      </radialGradient>
      <radialGradient id="petalInner" cx="50%" cy="60%" r="55%">
        <stop offset="0%" stop-color="#ffadc0"/>
        <stop offset="100%" stop-color="#d03060"/>
      </radialGradient>
      <linearGradient id="stemGrad" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#3a6b1a"/>
        <stop offset="50%" stop-color="#5a9e2f"/>
        <stop offset="100%" stop-color="#3a6b1a"/>
      </linearGradient>
      <linearGradient id="roseLeafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#7abf3a"/>
        <stop offset="100%" stop-color="#3a6b1a"/>
      </linearGradient>
      <filter id="softBloom" x="-80%" y="-80%" width="260%" height="260%">
        <feGaussianBlur stdDeviation="4" result="blur"/>
        <feMerge>
          <feMergeNode in="blur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
    </defs>
    <path id="roseStem" d="" fill="none" stroke="url(#stemGrad)" stroke-linecap="round"/>
    <g id="roseLeavesContainer"></g>
    <g id="budGroup"></g>
    <g id="flowerGroup"></g>
  </svg>
</div>
</div>

<script>
(function(){
    const svg = document.getElementById('roseGarden');
    const stemPath = document.getElementById('roseStem');
    const leavesContainer = document.getElementById('roseLeavesContainer');
    const flowerGroup = document.getElementById('flowerGroup');
    const budGroup = document.getElementById('budGroup');
    
    const BASE_X = 350;
    const BASE_Y = 440;
    const MAX_STEM_HEIGHT = 210;
    
    const leafSpecs = [
        { fraction: 0.28, side: 1.0, threshold: 0.10, baseOutAngle: -55, curlStart: -35, windPhaseOffset: 0.0 },
        { fraction: 0.78, side: -1.0, threshold: 0.35, baseOutAngle: 58, curlStart: -40, windPhaseOffset: 2.0 }
    ];
    
    let leafElements = [];
    let rosePetals = [];

    function createRoseFlower() {
        flowerGroup.innerHTML = '';
        rosePetals = [];
        const outerAngles = [0, 60, 120, 180, 240, 300];
        const innerAngles = [30, 90, 150, 210, 270, 330];
        const petalPath = "M0,0 C-18,-22 -26,-56 0,-72 C26,-56 18,-22 0,0 Z";
        outerAngles.forEach(angle => {
            const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            path.setAttribute("d", petalPath);
            path.setAttribute("fill", "url(#petalGrad)");
            path.setAttribute("stroke", "#b33f5c");
            path.setAttribute("stroke-width", "0.8");
            g.appendChild(path);
            const vein = document.createElementNS("http://www.w3.org/2000/svg", "path");
            vein.setAttribute("d", "M0,-10 Q-3,-35 0,-60");
            vein.setAttribute("stroke", "#ffcfdf");
            vein.setAttribute("stroke-width", "0.8");
            vein.setAttribute("fill", "none");
            vein.setAttribute("opacity", "0.4");
            g.appendChild(vein);
            flowerGroup.appendChild(g);
            rosePetals.push({ group: g, baseAngle: angle, type: 'outer', windPhase: angle * 0.5 });
        });
        innerAngles.forEach(angle => {
            const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            path.setAttribute("d", "M0,0 C-13,-18 -18,-44 0,-58 C18,-44 13,-18 0,0 Z");
            path.setAttribute("fill", "url(#petalInner)");
            path.setAttribute("stroke", "#a33653");
            path.setAttribute("stroke-width", "0.7");
            g.appendChild(path);
            const vein2 = document.createElementNS("http://www.w3.org/2000/svg", "path");
            vein2.setAttribute("d", "M0,-8 Q-2,-28 0,-48");
            vein2.setAttribute("stroke", "#ffbfcf");
            vein2.setAttribute("stroke-width", "0.6");
            vein2.setAttribute("fill", "none");
            vein2.setAttribute("opacity", "0.5");
            g.appendChild(vein2);
            flowerGroup.appendChild(g);
            rosePetals.push({ group: g, baseAngle: angle, type: 'inner', windPhase: angle * 0.7 });
        });
        const center = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        center.setAttribute("r", "9");
        center.setAttribute("fill", "#ffcf70");
        center.setAttribute("stroke", "#c9863a");
        center.setAttribute("stroke-width", "1");
        center.setAttribute("id", "roseCenter");
        flowerGroup.appendChild(center);
    }
    
    function createBud() {
        budGroup.innerHTML = '';
        const budContainer = document.createElementNS("http://www.w3.org/2000/svg", "g");
        budContainer.setAttribute("id", "budCore");
        for(let i=0; i<3; i++) {
            const angle = i * 120;
            const petal = document.createElementNS("http://www.w3.org/2000/svg", "path");
            petal.setAttribute("d", "M0,0 C-9,-12 -12,-28 0,-36 C12,-28 9,-12 0,0 Z");
            petal.setAttribute("fill", "url(#petalGrad)");
            petal.setAttribute("stroke", "#aa415b");
            petal.setAttribute("stroke-width", "0.6");
            const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
            g.appendChild(petal);
            g.setAttribute("transform", `rotate(${angle})`);
            budContainer.appendChild(g);
        }
        const sepal = document.createElementNS("http://www.w3.org/2000/svg", "path");
        sepal.setAttribute("d", "M0,-4 L-12,-18 L-4,-12 L0,-22 L4,-12 L12,-18 Z");
        sepal.setAttribute("fill", "#6e8842");
        sepal.setAttribute("opacity", "0.8");
        budContainer.appendChild(sepal);
        budGroup.appendChild(budContainer);
    }
    
    function buildRoseLeafPath() {
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("d", "M0,0 C-12,-9 -22,-28 -15,-44 C-9,-58 6,-62 14,-50 C22,-38 18,-15 8,-2 Z");
        path.setAttribute("fill", "url(#roseLeafGrad)");
        path.setAttribute("stroke", "#416b1f");
        path.setAttribute("stroke-width", "1.1");
        const vein = document.createElementNS("http://www.w3.org/2000/svg", "path");
        vein.setAttribute("d", "M0,-2 Q-2,-22 2,-48");
        vein.setAttribute("stroke", "#cbe4a2");
        vein.setAttribute("stroke-width", "0.9");
        vein.setAttribute("fill", "none");
        vein.setAttribute("opacity", "0.6");
        const group = document.createElementNS("http://www.w3.org/2000/svg", "g");
        group.appendChild(path);
        group.appendChild(vein);
        return group;
    }
    
    function initRoseLeaves() {
        leavesContainer.innerHTML = '';
        leafElements = [];
        for(let i=0; i<leafSpecs.length; i++) {
            const spec = leafSpecs[i];
            const leafGroup = buildRoseLeafPath();
            leavesContainer.appendChild(leafGroup);
            leafElements.push({ group: leafGroup, spec: spec, windPhaseOffset: spec.windPhaseOffset });
        }
    }
    
    function getBezierPoint(t, p0, p1, p2) {
        const mt = 1 - t;
        return { x: mt*mt*p0.x + 2*mt*t*p1.x + t*t*p2.x, y: mt*mt*p0.y + 2*mt*t*p1.y + t*t*p2.y };
    }
    function getBezierDerivative(t, p0, p1, p2) {
        return { dx: 2*(1-t)*(p1.x-p0.x)+2*t*(p2.x-p1.x), dy: 2*(1-t)*(p1.y-p0.y)+2*t*(p2.y-p1.y) };
    }
    
    let cycleAngle = 0.02, windTime = 0.3, lastFrameTime = 0;
    const CYCLE_SPEED = 0.00265, WIND_SPEED = 0.022;
    
    function updateRoseGarden() {
        const growthFactor = (Math.sin(cycleAngle) + 1) / 2;
        const windBase = Math.sin(windTime)*0.62 + Math.sin(windTime*1.87)*0.28 + Math.sin(windTime*0.43)*0.15;
        const windSway = windBase*0.85 + Math.sin(windTime*2.35)*0.12;
        const tipSway = windSway * 14 * growthFactor;
        const p0 = { x: BASE_X, y: BASE_Y };
        const p1 = { x: BASE_X + windSway*9*(0.5+growthFactor*0.6), y: BASE_Y - MAX_STEM_HEIGHT*growthFactor*0.48 - 8 };
        const p2 = { x: BASE_X + tipSway, y: BASE_Y - MAX_STEM_HEIGHT*growthFactor };
        stemPath.setAttribute("d", `M ${p0.x},${p0.y} Q ${p1.x},${p1.y} ${p2.x},${p2.y}`);
        stemPath.setAttribute("stroke-width", 4.2 + Math.min(3.8, growthFactor*4));
        
        const flowerPos = getBezierPoint(0.98, p0, p1, p2);
        const bloomFactor = Math.min(1.0, growthFactor*1.05);
        rosePetals.forEach(petal => {
            const isInner = petal.type === 'inner';
            const curlOpen = (1-bloomFactor)*-28;
            const flutter = Math.sin(windTime*2.7+petal.windPhase)*7*bloomFactor + Math.sin(windTime*5.3+petal.baseAngle)*3*bloomFactor;
            let rotAngle = petal.baseAngle + curlOpen + flutter;
            if(isInner) rotAngle += Math.sin(windTime*4.1+petal.baseAngle)*2.5*bloomFactor;
            let petalScale = Math.min(1.15, (isInner?0.7:0.9)*(0.3+bloomFactor*0.9));
            const ws = 1 + Math.sin(windTime*6+petal.baseAngle)*0.04;
            petal.group.setAttribute("transform", `translate(${flowerPos.x},${flowerPos.y}) rotate(${rotAngle}) scale(${petalScale*ws},${petalScale/ws})`);
            petal.group.querySelector("path:first-child").setAttribute("opacity", 0.3+bloomFactor*0.7);
        });
        const centerElem = document.getElementById("roseCenter");
        if(centerElem) {
            centerElem.setAttribute("transform", `translate(${flowerPos.x},${flowerPos.y}) scale(${0.5+bloomFactor*0.8})`);
            centerElem.setAttribute("opacity", 0.5+bloomFactor*0.5);
            centerElem.setAttribute("fill", `rgb(255,210,${100+bloomFactor*100})`);
        }
        
        let budFactor = growthFactor > 0.28 ? Math.min(1.0,(growthFactor-0.28)/0.72) : 0;
        const budAttach = getBezierPoint(0.55, p0, p1, p2);
        const derivBud = getBezierDerivative(0.55, p0, p1, p2);
        const budOutAngle = Math.atan2(derivBud.dy,derivBud.dx)*180/Math.PI + 65;
        const budCore = document.getElementById("budCore");
        if(budCore) {
            budCore.setAttribute("transform", `translate(${budAttach.x},${budAttach.y}) rotate(${budOutAngle+windSway*12*budFactor+(1-budFactor)*-15}) scale(${0.15+budFactor*0.9})`);
            budCore.setAttribute("opacity", 0.2+budFactor*0.8);
        }
        
        leafElements.forEach(leaf => {
            const spec = leaf.spec;
            let lg = growthFactor > spec.threshold ? Math.min(1.0, Math.pow((growthFactor-spec.threshold)/(1-spec.threshold),0.8)) : 0;
            const ls = Math.max(0.01, lg*(0.9+Math.sin(windTime*2.5+spec.fraction)*0.1)*0.9);
            const attach = getBezierPoint(spec.fraction, p0, p1, p2);
            const deriv = getBezierDerivative(spec.fraction, p0, p1, p2);
            const tangentAngle = Math.atan2(deriv.dy,deriv.dx)*180/Math.PI;
            const windResp = Math.sin(leaf.windPhaseOffset+windTime*1.6)*0.7 + Math.sin((leaf.windPhaseOffset+windTime*1.6)*2.2)*0.3;
            const finalRot = tangentAngle + spec.side*spec.baseOutAngle + spec.curlStart*(1-lg) + windResp*16*lg + windSway*6*lg + Math.sin(windTime*7+spec.fraction*20)*2.5*lg;
            leaf.group.setAttribute("transform", `translate(${attach.x},${attach.y}) rotate(${finalRot}) scale(${ls})`);
            leaf.group.querySelector("path:first-child").setAttribute("opacity", Math.min(0.95,0.2+lg*0.8));
            if(leaf.group.children[1]) leaf.group.children[1].setAttribute("opacity", 0.4+lg*0.5);
        });
        
        let tipGlow = document.getElementById("tipGlow");
        if(!tipGlow) {
            tipGlow = document.createElementNS("http://www.w3.org/2000/svg","circle");
            tipGlow.setAttribute("id","tipGlow");
            tipGlow.setAttribute("fill","#ffb57c");
            tipGlow.setAttribute("filter","url(#softBloom)");
            svg.appendChild(tipGlow);
        }
        const tipPos = getBezierPoint(0.99, p0, p1, p2);
        tipGlow.setAttribute("cx", tipPos.x);
        tipGlow.setAttribute("cy", tipPos.y);
        tipGlow.setAttribute("r", 2.5+growthFactor*4+Math.sin(windTime*15));
        tipGlow.setAttribute("opacity", 0.5+growthFactor*0.5);
    }
    
    function animateRose(currentTime) {
        if(!lastFrameTime) { lastFrameTime = currentTime; requestAnimationFrame(animateRose); return; }
        let delta = Math.min(32, currentTime - lastFrameTime);
        if(delta < 6) delta = 16;
        cycleAngle += CYCLE_SPEED*(delta/16);
        if(cycleAngle > Math.PI*2) cycleAngle -= Math.PI*2;
        windTime += WIND_SPEED*(delta/16);
        updateRoseGarden();
        lastFrameTime = currentTime;
        requestAnimationFrame(animateRose);
    }
    
    createRoseFlower();
    createBud();
    initRoseLeaves();
    updateRoseGarden();
    requestAnimationFrame(animateRose);
})();

(function(){
    const HISTORY_KEY = "roulette_history";

    function loadHistory() {
        const saved = localStorage.getItem(HISTORY_KEY);
        const historyDiv = document.getElementById('history');
        historyDiv.innerHTML = '';
        
        if (saved) {
            const history = JSON.parse(saved);
            history.forEach(num => {
                const item = document.createElement('div');
                item.className = 'history-item';
                item.textContent = num;
                historyDiv.appendChild(item);
            });
        }
    }

    function saveHistory(num) {
        const saved = localStorage.getItem(HISTORY_KEY);
        let history = saved ? JSON.parse(saved) : [];
        history.unshift(num);
        if (history.length > 7) history = history.slice(0, 7);
        localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
        loadHistory();
    }

    function spin() {
        const btn = document.getElementById("spinBtn");
        btn.disabled = true;
        const resultBox = document.getElementById('resultBox');
        resultBox.classList.add("spinning");

        document.getElementById('resultNumber').innerText = '???';
        document.getElementById('resultLabel').innerText = 'Крутим...';

        const finalNumber = Math.floor(Math.random() * 7) + 1;
        let counter = 0;
        const spins = 20;
        const spinDuration = 60;
        const symbols = ['?', '??', '???', '✨', '⭐', '💫', '🎰'];

        const spinInterval = setInterval(() => {
            counter++;
            const symbol = symbols[Math.floor(Math.random() * symbols.length)];
            document.getElementById('resultNumber').innerText = symbol;
            
            if (counter >= spins) {
                clearInterval(spinInterval);
                showResult(finalNumber, "Выпало", `Число: ${finalNumber}`);
                saveHistory(finalNumber);
                resultBox.classList.remove("spinning");
                resultBox.classList.add("result-pulse");
                document.getElementById('resultNumber').classList.add("number-reveal");
                btn.disabled = false;

                setTimeout(() => {
                    resultBox.classList.remove("result-pulse");
                    document.getElementById('resultNumber').classList.remove("number-reveal");
                }, 1000);

                if (navigator.vibrate) navigator.vibrate([50, 30, 50]);

                if (window.Telegram && window.Telegram.WebApp) {
                    window.Telegram.WebApp.sendData(JSON.stringify({
                        number: finalNumber
                    }));
                }
            }
        }, spinDuration);
    }

    function showResult(number, label, text) {
        document.getElementById("resultNumber").innerHTML = number;
        document.getElementById("resultLabel").innerHTML = label;
    }

    document.getElementById("spinBtn").addEventListener("click", spin);

    if (window.Telegram && window.Telegram.WebApp) {
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
    }
})();
</script>
</body>
</html>
